<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Dashboard - NexusSpace</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
    body { background: #0b0f19; color: white; font-family: sans-serif; padding: 20px; margin: 0;}
    .nav { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 15px 20px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);}
    .logo { font-size: 20px; font-weight: bold; color: #8b5cf6;}
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .card { background: #1e293b; padding: 30px; border-radius: 12px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.3s;}
    .card:hover, .card.active { border-color: #8b5cf6; background: #0f172a; transform: translateY(-3px);}
    .card i { font-size: 40px; margin-bottom: 15px; }
    
    /* MODAL FIXED */
    #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100;}
    .modal-box { background: #1e293b; padding: 30px; border-radius: 12px; width: 90%; max-width: 350px; text-align: center; box-sizing: border-box;}
    input { width: 100%; padding: 14px; margin: 15px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; outline:none;}
    button { width: 100%; padding: 14px; background: #8b5cf6; border: none; font-weight: bold; font-size:16px; border-radius: 8px; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center;}
    .loader { display: none; border: 3px solid transparent; border-top: 3px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
</style></head><body>

    <div class="nav">
        <div class="logo"><i class="fas fa-layer-group"></i> NexusSpace</div>
        <button style="width:auto; padding:8px 15px; background:#ef4444; font-size:14px;" onclick="window.location.href='/'">Logout</button>
    </div>

    <h2 style="font-size:18px;">1. Select Space Type</h2>
    <div class="grid" style="margin-bottom: 40px;">
        <div class="card" id="t-python" onclick="selectType('python')">
            <i class="fab fa-python" style="color:#f59e0b;"></i>
            <h3>Python Container</h3>
            <p style="color:#94a3b8; font-size:14px;">Host backend logic (.py)</p>
        </div>
        <div class="card" id="t-html" onclick="selectType('html')">
            <i class="fab fa-html5" style="color:#3b82f6;"></i>
            <h3>HTML Website</h3>
            <p style="color:#94a3b8; font-size:14px;">Host static pages (.html)</p>
        </div>
    </div>

    <h2 style="font-size:18px;">2. Your Active Spaces</h2>
    <div class="grid">
        {% for name, data in spaces.items() %}
        <div class="card active" style="text-align: left;" onclick="window.location.href='/workspace/{{ name }}'">
            <h3 style="margin-top:0;"><i class="fas fa-rocket" style="font-size:20px;"></i> {{ name }}</h3>
            <p style="color:#10b981; font-size:14px; margin-bottom:5px;">Status: {{ data.status }}</p>
            <p style="color:#94a3b8; font-size:12px; margin:0;">Type: {{ data.type | upper }}</p>
        </div>
        {% endfor %}
    </div>

    <div id="modal">
        <div class="modal-box">
            <h3 id="modal-title" style="margin-top:0;">Create Space</h3>
            <input type="text" id="s-name" placeholder="Space Name (e.g. my-app)">
            <button onclick="createSpace()" id="btn-create"><span id="btn-txt">Build Space</span> <div class="loader" id="ldr"></div></button>
            <p onclick="document.getElementById('modal').style.display='none'" style="color:#ef4444; cursor:pointer; margin-top:20px; margin-bottom:0;">Cancel</p>
        </div>
    </div>

    <script>
        let selectedType = "";
        function selectType(t) {
            selectedType = t;
            document.getElementById('t-python').style.borderColor = 'transparent';
            document.getElementById('t-html').style.borderColor = 'transparent';
            document.getElementById('t-'+t).style.borderColor = '#8b5cf6';
            document.getElementById('modal-title').innerText = `Create ${t.toUpperCase()} Space`;
            document.getElementById('modal').style.display = 'flex';
        }

        async function createSpace() {
            const n = document.getElementById('s-name').value;
            if(!n) return alert("Enter space name!");
            document.getElementById('btn-txt').style.display = 'none'; document.getElementById('ldr').style.display = 'block';
            
            const res = await fetch('/api/create_space', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: n, type: selectedType}) });
            const data = await res.json();
            
            if(data.status === 'success') {
                window.location.href = `/workspace/${data.space}`; // BUG FIXED
            } else { 
                alert(data.message); 
                document.getElementById('btn-txt').style.display = 'block'; 
                document.getElementById('ldr').style.display = 'none'; 
            }
        }
    </script>
</body></html>
