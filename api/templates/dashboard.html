<!DOCTYPE html>
<html><head><title>Dashboard - NexusSpace</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
    body { background: #0b0f19; color: white; font-family: sans-serif; padding: 20px; margin: 0;}
    .nav { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 15px 30px; border-radius: 12px; margin-bottom: 30px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .card { background: #1e293b; padding: 30px; border-radius: 12px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.3s;}
    .card:hover, .card.active { border-color: #3b82f6; background: #0f172a; transform: translateY(-5px);}
    .card i { font-size: 50px; margin-bottom: 15px; }
    
    /* MODAL */
    #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100;}
    .modal-box { background: #1e293b; padding: 30px; border-radius: 12px; width: 350px; text-align: center;}
    input { width: 100%; padding: 14px; margin: 15px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; outline:none;}
    button { width: 100%; padding: 14px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border: none; font-weight: bold; font-size:16px; border-radius: 8px; cursor: pointer; color: white; display: flex; justify-content: center;}
    .loader { display: none; border: 3px solid transparent; border-top: 3px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
</style></head><body>

    <div class="nav">
        <h2><i class="fas fa-cloud"></i> NexusSpace</h2>
        <button style="width:auto; padding:10px 20px; background:#ef4444;" onclick="window.location.href='/'">Logout</button>
    </div>

    <h2>1. Select Space Type</h2>
    <div class="grid" style="margin-bottom: 40px;">
        <div class="card" id="t-python" onclick="selectType('python')">
            <i class="fab fa-python" style="color:#f59e0b;"></i>
            <h3>Python App</h3>
            <p style="color:#94a3b8; font-size:14px;">Host backend logic</p>
        </div>
        <div class="card" id="t-html" onclick="selectType('html')">
            <i class="fab fa-html5" style="color:#3b82f6;"></i>
            <h3>HTML / Web</h3>
            <p style="color:#94a3b8; font-size:14px;">Host static websites</p>
        </div>
    </div>

    <h2>2. Your Active Spaces</h2>
    <div class="grid">
        {% for name, data in spaces.items() %}
        <div class="card active" style="text-align: left;" onclick="window.location.href='/workspace/{{ name }}'">
            <h3><i class="fas fa-rocket"></i> {{ name }}</h3>
            <p style="color:#10b981; font-size:14px;">Status: {{ data.status }}</p>
            <p style="color:#94a3b8; font-size:12px;">Type: {{ data.type | upper }}</p>
        </div>
        {% endfor %}
    </div>

    <!-- MODAL -->
    <div id="modal">
        <div class="modal-box">
            <h3 id="modal-title">Create Space</h3>
            <input type="text" id="s-name" placeholder="Unique space name (e.g. my-app)">
            <button onclick="createSpace()" id="btn-create"><span id="btn-txt">Build Space</span> <div class="loader" id="ldr"></div></button>
            <p onclick="document.getElementById('modal').style.display='none'" style="color:#ef4444; cursor:pointer; margin-top:15px;">Cancel</p>
        </div>
    </div>

    <script>
        let selectedType = "";
        function selectType(t) {
            selectedType = t;
            document.getElementById('t-python').style.borderColor = 'transparent';
            document.getElementById('t-html').style.borderColor = 'transparent';
            document.getElementById('t-'+t).style.borderColor = '#3b82f6';
            document.getElementById('modal-title').innerText = `Create ${t.toUpperCase()} Space`;
            document.getElementById('modal').style.display = 'flex';
        }

        async function createSpace() {
            const n = document.getElementById('s-name').value;
            if(!n) return alert("Enter space name!");
            document.getElementById('btn-txt').style.display = 'none'; document.getElementById('ldr').style.display = 'block';
            
            const res = await fetch('/api/create_space', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: n, type: selectedType}) });
            const data = await res.json();
            
            if(data.status === 'success') window.location.href = `/workspace/${n}`;
            else { alert(data.message); document.getElementById('btn-txt').style.display = 'block'; document.getElementById('ldr').style.display = 'none'; }
        }
    </script>
</body></html>
