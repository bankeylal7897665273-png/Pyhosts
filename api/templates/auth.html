<!DOCTYPE html>
<html><head><title>NexusSpace Cloud</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
    body { background: #0b0f19; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin:0;}
    .box { background: #1e293b; padding: 40px; border-radius: 12px; width: 320px; text-align: center; border-top: 4px solid #3b82f6; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    input { width: 100%; padding: 14px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; outline:none;}
    input:focus { border-color: #3b82f6; }
    button { width: 100%; padding: 14px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border: none; font-weight: bold; font-size:16px; border-radius: 8px; cursor: pointer; color: white; margin-top: 10px; display: flex; justify-content: center; align-items: center;}
    .loader { display: none; border: 3px solid transparent; border-top: 3px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    #notify { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    .popup { padding: 15px 25px; border-radius: 10px; margin-bottom: 10px; background: #1e293b; animation: slideIn 0.3s ease; border-left: 5px solid; font-weight: bold;}
    .popup.error { border-color: #ef4444; color: #ef4444; } .popup.success { border-color: #10b981; color: #10b981; }
    @keyframes slideIn { from{transform:translateX(100%);} to{transform:translateX(0);} }
</style></head><body>
    <div id="notify"></div>
    <div class="box">
        <h2 style="color:#3b82f6;"><i class="fas fa-cloud"></i> NexusSpace</h2>
        <h3 id="title">Secure Login</h3>
        <input type="email" id="em" placeholder="Email Address">
        <input type="password" id="pw" placeholder="Password">
        <button onclick="auth()" id="btn"><span id="btn-txt">Login to Console</span> <div class="loader" id="ldr"></div></button>
        <p onclick="toggle()" style="color:#94a3b8; cursor:pointer; font-size:14px; margin-top:20px;">Switch to Register</p>
    </div>
    <script>
        function showMsg(m, t) { const b = document.getElementById('notify'); const n = document.createElement('div'); n.className = `popup ${t}`; n.innerHTML = m; b.appendChild(n); setTimeout(() => n.remove(), 4000); }
        let isLog = true;
        function toggle() { isLog = !isLog; document.getElementById('title').innerText = isLog ? "Secure Login" : "Create Account"; document.getElementById('btn-txt').innerText = isLog ? "Login to Console" : "Sign Up"; }
        
        async function auth() {
            const e = document.getElementById('em').value, p = document.getElementById('pw').value;
            if(!e || !p) return showMsg("Fill all fields", "error");
            document.getElementById('btn-txt').style.display = 'none'; document.getElementById('ldr').style.display = 'block';
            
            const res = await fetch('/api/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({action: isLog ? 'login' : 'signup', email: e, password: p}) });
            const data = await res.json();
            
            if(data.status === 'success') window.location.href = '/dashboard';
            else { showMsg(data.message, "error"); document.getElementById('btn-txt').style.display = 'block'; document.getElementById('ldr').style.display = 'none'; }
        }
    </script>
</body></html>
